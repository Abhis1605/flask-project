{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-5">

                <h2 class="text-center mb-4">
                    Login
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Enter your email"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Enter password"
                            required
                        >

                    </div>

                    <button
                        class="btn btn-success w-100"
                        type="submit"
                    >
                        Login
                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">

                    Don't have an account?

                    <a href="{{ url_for('auth.register') }}">
                        Register
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
